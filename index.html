<!DOCTYPE html>
<html lang="pt-BR">
<body>
  <!-- GIF lateral esquerda -->
  <img src="images/beby.gif" alt="gif bebê" class="gif-left">

  <!-- GIF lateral direita -->
  <img src="images/Jesus.gif" alt="gif Jesus" class="gif-right">
</body>
<head>
  <meta charset="UTF-8">
  <title>ViadoVelho.com</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Bem-vindo ao ViadoVelho.com!</h1>
    <img src="images/viadovelho.com.jpeg" alt="viadovelho" class="main-img">
    <marquee>em construção 🚧</marquee>
    <img src="images/bob.gif" alt="bob" class="gif">
    <p>Hall da fama e desgrama em breve</p>
  </div>

  <section id="hall-da-fama">
    <h2 class="arc-text">
      <span>H</span><span>a</span><span>l</span><span>l</span>
      <span> </span><span>d</span><span>a</span>
      <span> </span><span>F</span><span>a</span><span>m</span><span>a</span>
    </h2>

    <div class="slideshow-container">
      <div class="mySlides fade">
        <img src="images/marcegoat.jpg" alt="MarceGOAT">
        <div class="text">MarceGOAT: o GOAT dos GOATs</div>
      </div>
      <div class="mySlides fade">
        <img src="images/magrelinho.jpg" alt="magrelinho">
        <div class="text">o segundo melhor marcelinho</div>
      </div>
      <div class="mySlides fade">
        <img src="images/dogla.jpg" alt="dogla">
        <div class="text">47 filhos e contando</div>
      </div>

      <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <div class="dots">
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
